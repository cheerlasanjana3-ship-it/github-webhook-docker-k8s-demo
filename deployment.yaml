apiVersion: apps/v1
kind: Deployment

metadata:
  name: cicd-webapp-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: cicd-webapp

  template:
    metadata:
      labels:
        app: cicd-webapp

    spec:
      containers:
      - name: cicd-webapp
        image: cicd-webapp:latest
        imagePullPolicy: Never

        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service

metadata:
  name: cicd-webapp-service

spec:
  type: NodePort

  selector:
    app: cicd-webapp

  ports:
  - port: 80
    targetPort: 80
